<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Music — Cloud Café</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/style.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background-color: var(--cream);
      background-image: radial-gradient(ellipse at 15% 15%, var(--gradient-a) 0%, transparent 55%),
                        radial-gradient(ellipse at 85% 85%, var(--gradient-b) 0%, transparent 55%);
      font-family: 'Lora', serif; color: var(--ink);
    }

    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2rem; background: var(--paper);
      border-bottom: 2px dashed var(--brown-pale); box-shadow: 0 2px 12px var(--shadow);
    }
    .back-btn { font-family: 'Caveat', cursive; font-size: 1.1rem; color: var(--brown); text-decoration: none; transition: color 0.2s; }
    .back-btn:hover { color: var(--brown-light); }
    .topbar-title { font-family: 'Caveat', cursive; font-size: 2rem; font-weight: 700; color: var(--brown); }
    .topbar-sub { font-family: 'Lora', serif; font-style: italic; font-size: 0.85rem; color: var(--ink-light); }

    .page { max-width: 860px; margin: 2rem auto; padding: 0 1.5rem; display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; align-items: start; }

    /* ── Player side ─────────────────────────────────────── */
    .player-side { display: flex; flex-direction: column; gap: 1rem; }

    .now-playing-label {
      font-family: 'Caveat', cursive; font-size: 1rem; color: var(--ink-light);
      text-align: center; font-style: italic;
    }

    .spotify-wrap {
      border-radius: 14px; overflow: hidden;
      box-shadow: 0 4px 20px var(--shadow);
      border: 2px solid var(--brown-pale);
      background: var(--paper);
      min-height: 352px;
      display: flex; align-items: center; justify-content: center;
    }
    #spotify-embed {
      width: 100%; border: none; border-radius: 12px;
      display: block;
    }

    .playlist-name {
      font-family: 'Caveat', cursive; font-size: 1.1rem; color: var(--brown);
      text-align: center; min-height: 1.5rem;
    }

    /* mood quick picks */
    .mood-picks { display: flex; flex-wrap: wrap; gap: 0.4rem; justify-content: center; }
    .mood-pill {
      font-family: 'Caveat', cursive; font-size: 0.95rem;
      background: var(--paper); border: 1.5px solid var(--brown-pale);
      color: var(--brown); border-radius: 20px; padding: 0.3rem 0.9rem;
      cursor: pointer; transition: all 0.15s;
    }
    .mood-pill:hover { background: var(--blush); border-color: var(--brown); }

    /* ── Chat side ───────────────────────────────────────── */
    .chat-side { display: flex; flex-direction: column; gap: 0; }

    .chat-card {
      background: var(--paper); border: 2px solid var(--brown-pale);
      border-radius: 14px; overflow: hidden;
      box-shadow: 0 4px 20px var(--shadow);
      display: flex; flex-direction: column;
    }

    .chat-header {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.8rem 1rem; background: var(--brown);
    }
    .chat-header-name { font-family: 'Caveat', cursive; font-size: 1.2rem; font-weight: 700; color: var(--cream); }
    .chat-header-sub  { font-family: 'Lora', serif; font-size: 0.72rem; font-style: italic; color: var(--blush); }

    #chat-window {
      height: 340px; overflow-y: auto;
      padding: 1rem; display: flex; flex-direction: column; gap: 0.6rem;
      background: var(--cream);
    }

    .message { font-family: 'Caveat', cursive; font-size: 1.1rem; line-height: 1.5; max-width: 85%; padding: 0.5rem 0.9rem; border-radius: 14px; }
    .message.bot  { background: var(--paper); border: 1.5px solid var(--brown-pale); color: var(--ink); align-self: flex-start; border-radius: 14px 14px 14px 4px; }
    .message.user { background: var(--brown); color: var(--cream); align-self: flex-end; border-radius: 14px 14px 4px 14px; }

    .typing { align-self: flex-start; display: flex; gap: 4px; padding: 0.6rem 0.9rem; background: var(--paper); border: 1.5px solid var(--brown-pale); border-radius: 14px 14px 14px 4px; }
    .typing span { width: 6px; height: 6px; background: var(--brown-pale); border-radius: 50%; animation: bounce 1.2s ease-in-out infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0);opacity:0.4} 40%{transform:translateY(-6px);opacity:1} }

    /* playlist suggestion card that appears in chat */
    .playlist-card {
      background: var(--blush); border: 1.5px solid var(--brown-pale);
      border-radius: 12px; padding: 0.7rem 1rem;
      display: flex; flex-direction: column; gap: 0.3rem;
      max-width: 85%; align-self: flex-start; cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .playlist-card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px var(--shadow); }
    .playlist-card-label { font-family: 'Caveat', cursive; font-size: 0.8rem; color: var(--ink-light); }
    .playlist-card-name  { font-family: 'Caveat', cursive; font-size: 1.1rem; color: var(--brown); font-weight: 600; }
    .playlist-card-tap   { font-family: 'Lora', serif; font-size: 0.72rem; font-style: italic; color: var(--ink-light); }

    .input-area {
      display: flex; padding: 0.7rem; background: var(--paper);
      border-top: 1.5px solid var(--brown-pale); gap: 0.4rem;
    }
    #user-input {
      flex: 1; border: 1.5px solid var(--brown-pale); border-radius: 10px;
      padding: 0.5rem 0.9rem; font-family: 'Caveat', cursive; font-size: 1.05rem;
      color: var(--ink); outline: none; background: var(--cream); transition: border-color 0.2s;
    }
    #user-input:focus { border-color: var(--brown); }
    #user-input::placeholder { color: var(--ink-light); font-style: italic; }
    .send-btn {
      font-family: 'Caveat', cursive; font-size: 1.05rem;
      padding: 0.5rem 1.1rem; background: var(--brown); color: var(--cream);
      border: none; border-radius: 10px; cursor: pointer; transition: background 0.2s;
    }
    .send-btn:hover { background: var(--brown-light); }

    @media (max-width: 640px) {
      .page { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <a href="/" class="back-btn">← back to café</a>
    <span class="topbar-title">🎵 music corner</span>
    <span class="topbar-sub">tell Mochi how you feel</span>
  </div>

  <div class="page">

    <!-- ── Player ───────────────────────────────────────── -->
    <div class="player-side">
      <p class="now-playing-label">now playing</p>

      <div class="spotify-wrap">
        <iframe id="spotify-embed"
          src="https://open.spotify.com/embed/playlist/37i9dQZF1DWZqd5JICZI0u?utm_source=generator&theme=0"
          height="352"
          allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
          loading="lazy">
        </iframe>
      </div>

      <p class="playlist-name" id="playlist-name">lofi chill beats ☕</p>

      <div class="mood-picks">
        <button class="mood-pill" onclick="quickMood('happy')">happy 🌸</button>
        <button class="mood-pill" onclick="quickMood('sad')">sad 🌧</button>
        <button class="mood-pill" onclick="quickMood('anxious')">anxious 🌀</button>
        <button class="mood-pill" onclick="quickMood('sleepy')">sleepy 🌙</button>
        <button class="mood-pill" onclick="quickMood('focused')">focused 📖</button>
        <button class="mood-pill" onclick="quickMood('cozy')">cozy 🧸</button>
      </div>
    </div>

    <!-- ── Chat ─────────────────────────────────────────── -->
    <div class="chat-side">
      <div class="chat-card">
        <div class="chat-header">
          <div>
            <div class="chat-header-name">Mochi</div>
            <div class="chat-header-sub">your music guide</div>
          </div>
        </div>

        <div id="chat-window"></div>

        <div class="input-area">
          <input type="text" id="user-input"
            placeholder="tell me how you're feeling..."
            onkeypress="if(event.key==='Enter')sendMessage()"/>
          <button class="send-btn" onclick="sendMessage()">send</button>
        </div>
      </div>
    </div>

  </div>

  <script>
    // ── Spotify playlist map ───────────────────────────────
    // Keys are mood keywords Gemini will return.
    // Values are Spotify playlist embed IDs.
    // Add more as needed — just grab the ID from the embed URL.
    const PLAYLISTS = {
      happy:    { id: '37i9dQZF1DX3rxVfibe1L0', name: 'happy vibes ☀️' },
      sad:      { id: '37i9dQZF1DX3YSRoSdA634', name: 'sad songs 🌧' },
      anxious:  { id: '37i9dQZF1DWZqd5JICZI0u', name: 'calm & focus 🌿' },
      sleepy:   { id: '37i9dQZF1DWZd79rJ6a7lp', name: 'sleep sounds 🌙' },
      focused:  { id: '37i9dQZF1DX8NTLI2TtZa6', name: 'deep focus 📖' },
      cozy:     { id: '37i9dQZF1DXbvABJXBIyiY', name: 'cozy café ☕' },
      romantic: { id: '37i9dQZF1DX50QitC6Oqtn', name: 'love songs 🌹' },
      energetic:{ id: '37i9dQZF1DX0BcQWzuB7ZO', name: 'energy boost ⚡' },
      melancholy:{ id: '37i9dQZF1DX3rxVfibe1L0', name: 'bittersweet 🍂' },
      hopeful:  { id: '37i9dQZF1DX2sUQwD7tbmL', name: 'feeling hopeful 🌱' },
      default:  { id: '37i9dQZF1DWZqd5JICZI0u', name: 'lofi chill beats ☕' },
    };

    let chatHistory = [];

    // ── Boot message ───────────────────────────────────────
    window.addEventListener('load', () => {
      setTimeout(() => {
        appendBot("hey! i'm Mochi 🐱 tell me how you're feeling and i'll find the perfect playlist for you. or tap one of the mood buttons!");
      }, 400);
    });

    // ── Quick mood buttons ─────────────────────────────────
    function quickMood(mood) {
      const input = document.getElementById('user-input');
      input.value = `i'm feeling ${mood}`;
      sendMessage();
    }

    // ── Send message ───────────────────────────────────────
    async function sendMessage() {
      const input = document.getElementById('user-input');
      const msg = input.value.trim();
      if (!msg) return;
      input.value = '';

      appendUser(msg);
      const typing = showTyping();

      chatHistory.push({ role: 'user', parts: [{ text: msg }] });

      try {
        const res = await fetch('/api/music-chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: msg, history: chatHistory })
        });
        const data = await res.json();
        typing.remove();

        appendBot(data.reply);
        chatHistory.push({ role: 'model', parts: [{ text: data.reply }] });

        // if Gemini returned a mood keyword, switch the playlist
        if (data.mood && PLAYLISTS[data.mood]) {
          const pl = PLAYLISTS[data.mood];
          setTimeout(() => {
            showPlaylistCard(pl.name, data.mood);
          }, 400);
        }
      } catch (err) {
        typing.remove();
        appendBot("purr... my ears are ringing. try again in a sec?");
      }
    }

    // ── Switch the Spotify embed ───────────────────────────
    function switchPlaylist(mood) {
      const pl = PLAYLISTS[mood] || PLAYLISTS.default;
      const embed = document.getElementById('spotify-embed');
      embed.src = `https://open.spotify.com/embed/playlist/${pl.id}?utm_source=generator&theme=0`;
      document.getElementById('playlist-name').textContent = pl.name;
    }

    // ── Show clickable playlist card in chat ───────────────
    function showPlaylistCard(name, mood) {
      const win = document.getElementById('chat-window');
      const card = document.createElement('div');
      card.className = 'playlist-card';
      card.innerHTML = `
        <span class="playlist-card-label">i think you'd like</span>
        <span class="playlist-card-name">${name}</span>
        <span class="playlist-card-tap">tap to play ▶</span>
      `;
      card.onclick = () => {
        switchPlaylist(mood);
        card.style.opacity = '0.6';
        card.style.pointerEvents = 'none';
        card.querySelector('.playlist-card-tap').textContent = 'playing now ✓';
      };
      win.appendChild(card);
      win.scrollTop = win.scrollHeight;
    }

    // ── Chat helpers ───────────────────────────────────────
    function appendBot(text) {
      const win = document.getElementById('chat-window');
      const el = document.createElement('div');
      el.className = 'message bot';
      el.textContent = text;
      win.appendChild(el);
      win.scrollTop = win.scrollHeight;
    }

    function appendUser(text) {
      const win = document.getElementById('chat-window');
      const el = document.createElement('div');
      el.className = 'message user';
      el.textContent = text;
      win.appendChild(el);
      win.scrollTop = win.scrollHeight;
    }

    function showTyping() {
      const win = document.getElementById('chat-window');
      const el = document.createElement('div');
      el.className = 'typing';
      el.innerHTML = '<span></span><span></span><span></span>';
      win.appendChild(el);
      win.scrollTop = win.scrollHeight;
      return el;
    }
  </script>
</body>
</html>
