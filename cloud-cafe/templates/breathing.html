<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Breathe — Cloud Café</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
  <!-- style.css owns ALL color variables — edit colors there only -->
  <link rel="stylesheet" href="/static/css/style.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 100vw; height: 100vh; overflow: hidden; background: var(--cream); display: flex; flex-direction: column; font-family: 'Lora', serif; color: var(--ink); }
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; background: var(--paper); border-bottom: 2px dashed var(--brown-pale); box-shadow: 0 2px 12px var(--shadow); flex-shrink: 0; }
    .back-btn { font-family: 'Caveat', cursive; font-size: 1.1rem; color: var(--brown); text-decoration: none; transition: color 0.2s; }
    .back-btn:hover { color: var(--brown-light); }
    .topbar-title { font-family: 'Caveat', cursive; font-size: 2rem; font-weight: 700; color: var(--brown); }
    .nav-link { font-family: 'Caveat', cursive; font-size: 1rem; padding: 0.45rem 1.1rem; border-radius: 20px; text-decoration: none; background: var(--sage); color: var(--ink); transition: background 0.2s, transform 0.1s; }
    .nav-link:hover { background: var(--sage-dark); color: var(--cream); transform: translateY(-1px); }
    .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2.5rem; padding: 1rem; position: relative; }
    .main::before { content: ''; position: absolute; inset: 0; background-image: radial-gradient(circle, var(--brown-pale) 1px, transparent 1px); background-size: 28px 28px; opacity: 0.3; pointer-events: none; }
    .pattern-row { display: flex; gap: 0.6rem; flex-wrap: wrap; justify-content: center; position: relative; z-index: 1; }
    .pattern-btn { font-family: 'Caveat', cursive; font-size: 0.95rem; padding: 0.4rem 1rem; border-radius: 20px; border: 2px solid var(--brown-pale); background: var(--paper); color: var(--ink-light); cursor: pointer; transition: all 0.15s; }
    .pattern-btn:hover { border-color: var(--brown-light); }
    .pattern-btn.active { background: var(--brown); color: var(--cream); border-color: var(--brown); font-weight: 700; }
    .circle-wrap { position: relative; display: flex; align-items: center; justify-content: center; z-index: 1; }
    .ring-outer { position: absolute; width: 300px; height: 300px; border-radius: 50%; border: 1.5px solid var(--brown-pale); opacity: 0.5; animation: ringPulse 8s ease-in-out infinite; }
    .ring-mid { position: absolute; width: 260px; height: 260px; border-radius: 50%; border: 1.5px solid var(--blush); opacity: 0.6; animation: ringPulse 8s ease-in-out infinite; animation-delay: 0.3s; }
    @keyframes ringPulse { 0%,100%{transform:scale(0.92);opacity:0.3} 50%{transform:scale(1.06);opacity:0.7} }
    .circle { width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle at 40% 35%, var(--cream) 0%, var(--blush) 40%, var(--brown-pale) 100%); box-shadow: 0 0 0 12px rgba(249,168,180,0.2), 0 0 0 24px rgba(249,168,180,0.1), 0 8px 32px var(--shadow); display: flex; align-items: center; justify-content: center; animation: breatheCircle 8s ease-in-out infinite; position: relative; }
    @keyframes breatheCircle { 0%{transform:scale(0.85)} 45%{transform:scale(1.18)} 55%{transform:scale(1.18)} 100%{transform:scale(0.85)} }
    .circle-text { font-family: 'Caveat', cursive; font-size: 1.3rem; font-weight: 600; color: var(--brown); text-align: center; line-height: 1.3; user-select: none; pointer-events: none; }
    .phase-label { font-family: 'Lora', serif; font-style: italic; font-size: 1rem; color: var(--ink-light); text-align: center; min-height: 1.5rem; position: relative; z-index: 1; }
    .counter { font-family: 'Caveat', cursive; font-size: 1rem; color: var(--ink-light); position: relative; z-index: 1; }
    .controls { display: flex; gap: 0.8rem; position: relative; z-index: 1; }
    .ctrl-btn { font-family: 'Caveat', cursive; font-size: 1rem; padding: 0.5rem 1.4rem; border-radius: 20px; border: 2px solid var(--brown-pale); background: var(--paper); color: var(--brown); cursor: pointer; transition: all 0.15s; }
    .ctrl-btn:hover { background: var(--brown-pale); }
    .ctrl-btn.primary { background: var(--brown); color: var(--cream); border-color: var(--brown); }
    .ctrl-btn.primary:hover { background: var(--brown-light); }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="/" class="back-btn">← back to café</a>
    <span class="topbar-title">☕ breathe</span>
    <a href="/journal" class="nav-link">open journal</a>
  </div>
  <div class="main">
    <div class="pattern-row">
      <button class="pattern-btn active" data-pattern="box"    onclick="setPattern(this)">box breathing</button>
      <button class="pattern-btn"        data-pattern="478"    onclick="setPattern(this)">4-7-8</button>
      <button class="pattern-btn"        data-pattern="simple" onclick="setPattern(this)">simple</button>
    </div>
    <div class="circle-wrap">
      <div class="ring-outer"></div>
      <div class="ring-mid"></div>
      <div class="circle" id="breathe-circle">
        <div class="circle-text" id="circle-text">ready</div>
      </div>
    </div>
    <div class="phase-label" id="phase-label">tap start when you're ready</div>
    <div class="counter" id="counter"></div>
    <div class="controls">
      <button class="ctrl-btn primary" id="start-btn" onclick="toggleBreathing()">start</button>
      <button class="ctrl-btn" onclick="resetBreathing()">reset</button>
    </div>
  </div>
<script>
  const PATTERNS = {
    box:    [{label:'breathe in',instruction:'inhale',duration:4},{label:'hold',instruction:'hold',duration:4},{label:'breathe out',instruction:'exhale',duration:4},{label:'hold',instruction:'hold',duration:4}],
    '478':  [{label:'breathe in',instruction:'inhale',duration:4},{label:'hold',instruction:'hold',duration:7},{label:'breathe out',instruction:'exhale',duration:8}],
    simple: [{label:'breathe in',instruction:'inhale',duration:4},{label:'breathe out',instruction:'exhale',duration:6}],
  };
  let currentPattern='box', isRunning=false, phaseIndex=0, cycleCount=0, countdownTimer=null, phaseTimer=null;
  function setPattern(btn) { if(isRunning) resetBreathing(); document.querySelectorAll('.pattern-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); currentPattern=btn.dataset.pattern; document.getElementById('phase-label').textContent="tap start when you're ready"; document.getElementById('circle-text').textContent='ready'; document.getElementById('counter').textContent=''; }
  function toggleBreathing() { isRunning ? pauseBreathing() : startBreathing(); }
  function startBreathing() { isRunning=true; document.getElementById('start-btn').textContent='pause'; runPhase(); }
  function pauseBreathing() { isRunning=false; clearTimeout(phaseTimer); clearInterval(countdownTimer); document.getElementById('start-btn').textContent='resume'; document.getElementById('phase-label').textContent='paused'; }
  function resetBreathing() { isRunning=false; clearTimeout(phaseTimer); clearInterval(countdownTimer); phaseIndex=0; cycleCount=0; document.getElementById('start-btn').textContent='start'; document.getElementById('circle-text').textContent='ready'; document.getElementById('phase-label').textContent="tap start when you're ready"; document.getElementById('counter').textContent=''; const circle=document.getElementById('breathe-circle'); circle.style.animation='none'; void circle.offsetWidth; circle.style.animation=''; }
  function runPhase() {
    if(!isRunning) return;
    const phases=PATTERNS[currentPattern], phase=phases[phaseIndex];
    document.getElementById('circle-text').textContent=phase.instruction;
    document.getElementById('phase-label').textContent=phase.label;
    updateCircleAnimation(phase);
    clearInterval(countdownTimer);
    phaseTimer=setTimeout(()=>{phaseIndex++;if(phaseIndex>=phases.length){phaseIndex=0;cycleCount++;document.getElementById('counter').textContent=`${cycleCount} cycle${cycleCount!==1?'s':''}`;}runPhase();},phase.duration*1000);
  }
  function updateCircleAnimation(phase) {
    const circle=document.getElementById('breathe-circle'), rings=document.querySelectorAll('.ring-outer,.ring-mid'), dur=`${phase.duration}s`;
    if(phase.instruction==='inhale'){circle.style.animation=`expandCircle ${dur} ease-in forwards`;rings.forEach(r=>r.style.animation=`ringExpand ${dur} ease-in forwards`);}
    else if(phase.instruction==='exhale'){circle.style.animation=`contractCircle ${dur} ease-out forwards`;rings.forEach(r=>r.style.animation=`ringContract ${dur} ease-out forwards`);}
    else{circle.style.animation='none';rings.forEach(r=>r.style.animation='none');}
  }
  const ss=document.createElement('style');
  ss.textContent=`
    @keyframes expandCircle{from{transform:scale(0.85)}to{transform:scale(1.18)}}
    @keyframes contractCircle{from{transform:scale(1.18)}to{transform:scale(0.85)}}
    @keyframes ringExpand{from{transform:scale(0.88);opacity:0.3}to{transform:scale(1.1);opacity:0.6}}
    @keyframes ringContract{from{transform:scale(1.1);opacity:0.6}to{transform:scale(0.88);opacity:0.3}}
  `;
  document.head.appendChild(ss);
</script>
</body>
</html>
