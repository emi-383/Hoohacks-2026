<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fortune Cookie — Cloud Café</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet"/>
  <!-- style.css owns ALL color variables — edit colors there only -->
  <link rel="stylesheet" href="/static/css/style.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; background-color: var(--cream); background-image: radial-gradient(ellipse at 20% 20%, var(--gradient-a) 0%, transparent 50%), radial-gradient(ellipse at 80% 80%, var(--gradient-b) 0%, transparent 50%); font-family: 'Lora', serif; color: var(--ink); }
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; background: var(--paper); border-bottom: 2px dashed var(--brown-pale); box-shadow: 0 2px 12px var(--shadow); }
    .back-btn { font-family: 'Caveat', cursive; font-size: 1.1rem; color: var(--brown); text-decoration: none; transition: color 0.2s; }
    .back-btn:hover { color: var(--brown-light); }
    .topbar-title { font-family: 'Caveat', cursive; font-size: 2rem; font-weight: 700; color: var(--brown); }
    .topbar-right { display: flex; align-items: center; gap: 0.8rem; }
    .coin-badge { font-family: 'Caveat', cursive; font-size: 0.95rem; color: var(--brown); background: var(--brown-pale); padding: 0.3rem 0.8rem; border-radius: 20px; text-decoration: none; transition: background 0.2s; }
    .coin-badge:hover { background: var(--blush); }
    .nav-link { font-family: 'Caveat', cursive; font-size: 1rem; padding: 0.45rem 1.1rem; border-radius: 20px; text-decoration: none; background: var(--sage); color: var(--ink); transition: background 0.2s, transform 0.1s; }
    .nav-link:hover { background: var(--sage-dark); color: var(--cream); transform: translateY(-1px); }
    .page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: calc(100vh - 65px); padding: 2rem 1.5rem; gap: 2rem; }
    .intro { text-align: center; max-width: 420px; }
    .intro-title { font-family: 'Caveat', cursive; font-size: 1.6rem; font-weight: 700; color: var(--brown); display: block; margin-bottom: 0.4rem; }
    .intro-sub { font-family: 'Lora', serif; font-style: italic; font-size: 0.92rem; color: var(--ink-light); }
    .cookie-scene { position: relative; width: 260px; height: 260px; display: flex; align-items: center; justify-content: center; }
    .cookie-whole { width: 160px; height: 120px; background: linear-gradient(135deg, var(--gold-light), var(--gold)); border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%; box-shadow: inset 0 -6px 12px rgba(0,0,0,0.08), 0 8px 24px var(--shadow); cursor: pointer; transition: transform 0.25s, box-shadow 0.25s; position: relative; }
    .cookie-whole::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%) rotate(-15deg); width: 60%; height: 2px; background: rgba(192,72,90,0.2); border-radius: 2px; }
    .cookie-whole:hover { transform: scale(1.05) rotate(-2deg); box-shadow: inset 0 -6px 12px rgba(0,0,0,0.08), 0 14px 32px var(--shadow); }
    .tap-hint { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); font-family: 'Caveat', cursive; font-size: 0.9rem; color: var(--ink-light); white-space: nowrap; animation: hintPulse 2.5s ease-in-out infinite; }
    @keyframes hintPulse { 0%,100%{opacity:0.5} 50%{opacity:1} }
    .cookie-half { position: absolute; width: 80px; height: 100px; background: linear-gradient(135deg, var(--gold-light), var(--gold)); box-shadow: 0 8px 20px var(--shadow); opacity: 0; pointer-events: none; }
    .cookie-half.left { border-radius: 80% 20% 20% 80%/50% 50% 50% 50%; left: 50%; transform: translateX(-100%); }
    .cookie-half.right { border-radius: 20% 80% 80% 20%/50% 50% 50% 50%; left: 50%; transform: translateX(0%); }
    .cookie-scene.cracking .cookie-whole { animation: cookieCrack 0.4s ease forwards; }
    .cookie-scene.cracking .cookie-half { opacity: 1; }
    .cookie-scene.cracking .cookie-half.left  { animation: flyLeft  0.5s ease 0.3s forwards; }
    .cookie-scene.cracking .cookie-half.right { animation: flyRight 0.5s ease 0.3s forwards; }
    @keyframes cookieCrack { 0%{transform:scale(1);opacity:1} 40%{transform:scale(1.08) rotate(3deg)} 100%{transform:scale(0);opacity:0} }
    @keyframes flyLeft  { from{transform:translateX(-100%) rotate(0deg);opacity:1} to{transform:translateX(-180%) rotate(-35deg) translateY(-20px);opacity:0.7} }
    @keyframes flyRight { from{transform:translateX(0%) rotate(0deg);opacity:1} to{transform:translateX(80%) rotate(30deg) translateY(-20px);opacity:0.7} }
    .fortune-wrap { max-width: 440px; width: 100%; display: none; flex-direction: column; align-items: center; gap: 1.2rem; animation: fortuneReveal 0.6s ease forwards; }
    .fortune-wrap.revealed { display: flex; }
    @keyframes fortuneReveal { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .fortune-paper { width: 100%; background: var(--paper); border: 2px solid var(--brown-pale); border-radius: 4px; padding: 2rem 1.8rem; box-shadow: 0 4px 20px var(--shadow); position: relative; clip-path: polygon(0% 4%,3% 0%,6% 3%,9% 0%,12% 3%,15% 0%,18% 3%,21% 0%,24% 3%,27% 0%,30% 3%,33% 0%,36% 3%,39% 0%,42% 3%,45% 0%,48% 3%,51% 0%,54% 3%,57% 0%,60% 3%,63% 0%,66% 3%,69% 0%,72% 3%,75% 0%,78% 3%,81% 0%,84% 3%,87% 0%,90% 3%,93% 0%,96% 3%,100% 0%,100% 100%,0% 100%); }
    .fortune-paper::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--gold-light), var(--gold), var(--gold-light)); }
    .fortune-label { font-family: 'Caveat', cursive; font-size: 0.85rem; color: var(--ink-light); letter-spacing: 0.12em; display: block; margin-bottom: 1rem; text-align: center; }
    .fortune-text { font-family: 'Lora', serif; font-style: italic; font-size: 1.25rem; line-height: 1.75; color: var(--ink); text-align: center; display: block; }
    .fortune-text.loading { color: var(--ink-light); font-size: 1rem; animation: fortuneLoading 1.5s ease-in-out infinite; }
    @keyframes fortuneLoading { 0%,100%{opacity:0.4} 50%{opacity:1} }
    .fortune-date { font-family: 'Caveat', cursive; font-size: 0.8rem; color: var(--ink-light); display: block; text-align: right; margin-top: 1.2rem; }
    .fortune-actions { display: flex; gap: 0.8rem; flex-wrap: wrap; justify-content: center; }
    .action-btn { font-family: 'Caveat', cursive; font-size: 1rem; padding: 0.5rem 1.4rem; border-radius: 20px; border: 2px solid var(--brown-pale); background: transparent; color: var(--brown); cursor: pointer; text-decoration: none; transition: all 0.15s; display: inline-block; }
    .action-btn:hover { background: var(--brown-pale); }
    .action-btn.primary { background: var(--brown); color: var(--cream); border-color: var(--brown); }
    .action-btn.primary:hover { background: var(--brown-light); }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="/" class="back-btn">← back to café</a>
    <span class="topbar-title">☕ fortune cookie</span>
    <div class="topbar-right">
      <a href="/closet" class="coin-badge" id="coin-badge">— coins</a>
      <a href="/journal" class="nav-link">open journal</a>
    </div>
  </div>
  <div class="page">
    <div class="intro">
      <span class="intro-title">a little something for today</span>
      <span class="intro-sub">tap the cookie to reveal your message</span>
    </div>
    <div class="cookie-scene" id="cookie-scene">
      <div class="cookie-whole" id="cookie-whole" onclick="crackCookie()"></div>
      <div class="cookie-half left"></div>
      <div class="cookie-half right"></div>
      <span class="tap-hint" id="tap-hint">tap to open</span>
    </div>
    <div class="fortune-wrap" id="fortune-wrap">
      <div class="fortune-paper">
        <span class="fortune-label">your fortune</span>
        <span class="fortune-text loading" id="fortune-text">opening your fortune...</span>
        <span class="fortune-date" id="fortune-date"></span>
      </div>
      <div class="fortune-actions">
        <a href="/journal" class="action-btn">write about it</a>
        <button class="action-btn primary" onclick="getAnother()">another one</button>
      </div>
    </div>
  </div>
<script>
  document.getElementById('fortune-date').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  async function loadCoins() { try { const res=await fetch('/api/coins'); const data=await res.json(); document.getElementById('coin-badge').textContent=`${data.coins} coin${data.coins!==1?'s':''}`; } catch {} }
  loadCoins();
  function crackCookie() {
    document.getElementById('cookie-whole').onclick = null;
    document.getElementById('tap-hint').style.display = 'none';
    document.getElementById('cookie-scene').classList.add('cracking');
    setTimeout(() => { document.getElementById('cookie-scene').style.display='none'; document.getElementById('fortune-wrap').classList.add('revealed'); fetchFortune(); }, 900);
  }
  async function fetchFortune() {
    try { const res=await fetch('/api/fortune'); const data=await res.json(); const el=document.getElementById('fortune-text'); el.classList.remove('loading'); el.textContent=data.fortune; loadCoins(); }
    catch { const el=document.getElementById('fortune-text'); el.classList.remove('loading'); el.textContent='something good is on its way to you today.'; }
  }
  function getAnother() {
    const scene=document.getElementById('cookie-scene'); scene.classList.remove('cracking'); scene.style.display='flex';
    const wrap=document.getElementById('fortune-wrap'); wrap.classList.remove('revealed');
    const el=document.getElementById('fortune-text'); el.classList.add('loading'); el.textContent='opening your fortune...';
    document.getElementById('cookie-whole').onclick=crackCookie; document.getElementById('tap-hint').style.display='block';
  }
</script>
</body>
</html>
