<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Closet — Cloud Café</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
  <!-- style.css owns ALL color variables — edit colors there only -->
  <link rel="stylesheet" href="/static/css/style.css"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { min-height: 100vh; background-color: var(--cream); background-image: radial-gradient(ellipse at 15% 15%, var(--gradient-a) 0%, transparent 55%), radial-gradient(ellipse at 85% 85%, var(--gradient-b) 0%, transparent 55%); font-family: 'Lora', serif; color: var(--ink); }
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 1rem 2rem; background: var(--paper); border-bottom: 2px dashed var(--brown-pale); box-shadow: 0 2px 12px var(--shadow); }
    .back-btn { font-family: 'Caveat', cursive; font-size: 1.1rem; color: var(--brown); text-decoration: none; transition: color 0.2s; }
    .back-btn:hover { color: var(--brown-light); }
    .topbar-title { font-family: 'Caveat', cursive; font-size: 2rem; font-weight: 700; color: var(--brown); }
    .coin-balance { font-family: 'Caveat', cursive; font-size: 1.1rem; font-weight: 700; color: var(--brown); background: var(--blush); border: 2px solid var(--brown-pale); border-radius: 20px; padding: 0.35rem 1rem; }
    .layout { display: grid; grid-template-columns: 220px 1fr; gap: 1.5rem; max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; }
    .cat-preview-card { background: var(--paper); border: 2px solid var(--brown-pale); border-radius: 14px; padding: 1.5rem; box-shadow: 0 2px 16px var(--shadow); display: flex; flex-direction: column; align-items: center; gap: 1rem; position: sticky; top: 1.5rem; align-self: start; }
    .preview-title { font-family: 'Caveat', cursive; font-size: 1.1rem; color: var(--brown); }
    .preview-cat-wrap { position: relative; width: 130px; height: 160px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
    .preview-cat-body { width: 88px; height: 108px; background: var(--brown-pale); border-radius: 50% 50% 42% 42%; position: relative; box-shadow: 0 4px 14px var(--shadow); }
    .preview-cat-body::before, .preview-cat-body::after { content: ''; position: absolute; top: -17px; width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-bottom: 20px solid var(--brown-pale); }
    .preview-cat-body::before { left: 10px; } .preview-cat-body::after { right: 10px; }
    .cat-eye { position: absolute; top: 30px; width: 10px; height: 10px; background: var(--brown); border-radius: 50%; }
    .cat-eye.l { left: 18px; } .cat-eye.r { right: 18px; }
    .cat-nose { position: absolute; top: 48px; left: 50%; transform: translateX(-50%); width: 6px; height: 5px; background: var(--brown-light); border-radius: 50%; }
    #preview-outfit-layers { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 88px; height: 108px; pointer-events: none; }
    #preview-outfit-layers img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; }
    .preview-equipped-list { font-family: 'Caveat', cursive; font-size: 0.85rem; color: var(--ink-light); text-align: center; line-height: 1.6; }
    .earn-hint { font-family: 'Lora', serif; font-style: italic; font-size: 0.78rem; color: var(--ink-light); text-align: center; line-height: 1.5; padding: 0.6rem; background: var(--cream); border-radius: 8px; border: 1px solid var(--brown-pale); width: 100%; }
    .shop-panel { display: flex; flex-direction: column; gap: 1.2rem; }
    .section-title { font-family: 'Caveat', cursive; font-size: 1.2rem; color: var(--brown); margin-bottom: 0.8rem; display: block; }
    .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.8rem; }
    .item-card { background: var(--paper); border: 2px solid var(--brown-pale); border-radius: 12px; padding: 1rem 0.8rem; display: flex; flex-direction: column; align-items: center; gap: 0.5rem; transition: box-shadow 0.2s, transform 0.2s; }
    .item-card:hover { box-shadow: 0 4px 16px var(--shadow); transform: translateY(-2px); }
    .item-card.owned { border-color: var(--sage-dark); background: var(--cream); }
    .item-card.equipped { border-color: var(--brown); background: var(--blush); }
    .item-art { width: 72px; height: 72px; border-radius: 8px; border: 1.5px dashed var(--brown-pale); background: var(--cream); object-fit: contain; }
    .item-name { font-family: 'Caveat', cursive; font-size: 1rem; color: var(--brown); font-weight: 600; text-align: center; }
    .item-price { font-family: 'Caveat', cursive; font-size: 0.85rem; color: var(--ink-light); }
    .item-price.free { color: var(--sage-dark); font-weight: 700; }
    .item-btn { font-family: 'Caveat', cursive; font-size: 0.9rem; width: 100%; padding: 0.35rem 0; border-radius: 20px; border: 1.5px solid var(--brown-pale); background: transparent; color: var(--brown); cursor: pointer; transition: all 0.15s; }
    .item-btn:hover { background: var(--brown-pale); }
    .item-btn.buy { background: var(--brown); color: var(--cream); border-color: var(--brown); }
    .item-btn.buy:hover { background: var(--brown-light); }
    .item-btn.equipped-btn { background: var(--brown); color: var(--cream); border-color: var(--brown); }
    .item-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--brown); color: var(--cream); font-family: 'Caveat', cursive; font-size: 1.05rem; padding: 0.7rem 1.4rem; border-radius: 20px; box-shadow: 0 4px 16px var(--shadow); opacity: 0; transform: translateY(8px); transition: all 0.3s; pointer-events: none; z-index: 100; }
    .toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="/" class="back-btn">← back to café</a>
    <span class="topbar-title">☕ Mochi's closet</span>
    <span class="coin-balance" id="coin-balance">— coins</span>
  </div>
  <div class="layout">
    <div class="cat-preview-card">
      <span class="preview-title">Mochi today</span>
      <div class="preview-cat-wrap">
        <div class="preview-cat-body">
          <div class="cat-eye l"></div><div class="cat-eye r"></div><div class="cat-nose"></div>
          <div id="preview-outfit-layers"></div>
        </div>
      </div>
      <p class="preview-equipped-list" id="equipped-list">nothing equipped yet</p>
      <div class="earn-hint">earn coins by journaling, logging moods, opening fortunes, and visiting daily</div>
    </div>
    <div class="shop-panel">
      <div><span class="section-title">hats</span><div class="items-grid" id="hats-grid"></div></div>
      <div><span class="section-title">scarves & collars</span><div class="items-grid" id="scarves-grid"></div></div>
      <div><span class="section-title">full outfits</span><div class="items-grid" id="outfits-grid"></div></div>
    </div>
  </div>
  <div class="toast" id="toast"></div>
<script>
  const ITEMS = [
    { slug:'hat-beret',        name:'beret',        price:30, category:'hat' },
    { slug:'hat-tophat',       name:'top hat',      price:50, category:'hat' },
    { slug:'hat-flowers',      name:'flower crown', price:40, category:'hat' },
    { slug:'hat-bow',          name:'bow',          price:20, category:'hat' },
    { slug:'scarf-pink',       name:'pink scarf',   price:25, category:'scarf' },
    { slug:'collar-bow',       name:'bow collar',   price:20, category:'scarf' },
    { slug:'collar-star',      name:'star collar',  price:35, category:'scarf' },
    { slug:'outfit-apron',     name:'café apron',   price:60, category:'outfit' },
    { slug:'outfit-raincoat',  name:'raincoat',     price:80, category:'outfit' },
    { slug:'outfit-cardigan',  name:'cardigan',     price:70, category:'outfit' },
  ];
  let coins = 0, wardrobe = {};
  async function loadWardrobe() {
    try {
      const res = await fetch('/api/wardrobe'); const data = await res.json();
      coins = data.coins; updateCoinDisplay();
      wardrobe = {};
      data.items.forEach(i => { wardrobe[i.slug] = { purchased:i.purchased, equipped:i.equipped }; });
      renderShop(); renderPreview();
    } catch { showToast('could not load wardrobe'); }
  }
  function renderShop() {
    const hatsGrid=document.getElementById('hats-grid'), scarvesGrid=document.getElementById('scarves-grid'), outfitsGrid=document.getElementById('outfits-grid');
    hatsGrid.innerHTML = scarvesGrid.innerHTML = outfitsGrid.innerHTML = '';
    ITEMS.forEach(item => {
      const state = wardrobe[item.slug] || { purchased:0, equipped:0 };
      const card = document.createElement('div');
      card.className = 'item-card' + (state.purchased ? (state.equipped ? ' equipped' : ' owned') : '');
      card.id = `card-${item.slug}`;
      const artDiv = document.createElement('div'); artDiv.className = 'item-art';
      const name = document.createElement('span'); name.className = 'item-name'; name.textContent = item.name;
      const price = document.createElement('span'); price.className = item.price===0?'item-price free':'item-price'; price.textContent = item.price===0?'free':`${item.price} coins`;
      const btn = document.createElement('button'); btn.className = 'item-btn';
      if (!state.purchased) { btn.textContent=`buy — ${item.price}`; btn.classList.add('buy'); if(coins<item.price) btn.disabled=true; btn.onclick=()=>buyItem(item.slug,item.price); }
      else if (state.equipped) { btn.textContent='unequip'; btn.classList.add('equipped-btn'); btn.onclick=()=>equipItem(item.slug,false); }
      else { btn.textContent='equip'; btn.onclick=()=>equipItem(item.slug,true); }
      card.appendChild(artDiv); card.appendChild(name); card.appendChild(price); card.appendChild(btn);
      if (item.category==='hat') hatsGrid.appendChild(card);
      else if (item.category==='scarf') scarvesGrid.appendChild(card);
      else outfitsGrid.appendChild(card);
    });
  }
  function renderPreview() {
    const layer=document.getElementById('preview-outfit-layers'), listEl=document.getElementById('equipped-list');
    const equippedItems=ITEMS.filter(i=>wardrobe[i.slug]?.equipped);
    layer.innerHTML='';
    equippedItems.forEach(item => { const img=document.createElement('img'); img.src=`/static/img/outfits/outfit-${item.slug}.png`; img.alt=item.name; img.onerror=()=>img.style.display='none'; layer.appendChild(img); });
    listEl.textContent = equippedItems.length>0 ? equippedItems.map(i=>i.name).join(', ') : 'nothing equipped yet';
  }
  async function buyItem(slug,price) {
    try {
      const res=await fetch('/api/wardrobe/buy',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({slug,price})});
      if(!res.ok){showToast('not enough coins');return;}
      coins-=price; wardrobe[slug]={purchased:1,equipped:0}; updateCoinDisplay(); renderShop(); showToast(`${slug.replace(/-/g,' ')} purchased`);
    } catch { showToast('could not buy item'); }
  }
  async function equipItem(slug,equipped) {
    try {
      await fetch('/api/wardrobe/equip',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({slug,equipped})});
      if(!wardrobe[slug]) wardrobe[slug]={purchased:1,equipped:0};
      wardrobe[slug].equipped=equipped?1:0; renderShop(); renderPreview(); showToast(equipped?'equipped':'unequipped');
    } catch { showToast('could not update outfit'); }
  }
  function updateCoinDisplay() { document.getElementById('coin-balance').textContent=`${coins} coin${coins!==1?'s':''}`; }
  function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
  loadWardrobe();
</script>
</body>
</html>
